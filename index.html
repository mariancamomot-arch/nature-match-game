<!DOCTYPE html>
<html>
<head>
<title>Nature Memory Match</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #a8e6cf;
}

#app {
  max-width: 420px;
  margin: auto;
  height: 100vh;
  background: white;
  display: flex;
  flex-direction: column;
}

.header {
  background: #4caf50;
  color: white;
  padding: 15px;
}

.screen {
  flex: 1;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.active { display: flex; }

button {
  padding: 12px;
  margin: 8px;
  border-radius: 10px;
  border: none;
  background: #4caf50;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  padding: 10px;
}

.cell {
  aspect-ratio: 1;
  font-size: 26px;
  background: #eee;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>

<body>

<div id="app">

<div class="header">рЯМњ Easy Nature Match</div>

<div id="startScreen" class="screen active">
  <h2>Easy Mode</h2>
  <button onclick="startGame()">Start</button>
</div>

<div id="gameScreen" class="screen">
  <p>Lives: <span id="lives">вЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄП</span></p>
  <p>Matches: <span id="count">0</span>/12</p>

  <div class="grid" id="grid"></div>
</div>

</div>

<script>
const items=["рЯМК","рЯМ≥","рЯМЄ","рЯНА","рЯМЉ","рЯМµ"];
let grid=[],revealed=[],selected=[];
let lives=7,count=0;

function startGame(){
  startScreen.classList.remove("active");
  gameScreen.classList.add("active");
  createGrid();
  previewTiles();
}

/* SHOW ALL FIRST */
function previewTiles(){
  const cells=document.querySelectorAll(".cell");

  cells.forEach((cell,i)=>{
    cell.innerText=grid[i];
  });

  setTimeout(()=>{
    cells.forEach(cell=>cell.innerText="вђЬ");
  },3000);
}

function createGrid(){
  const g=document.getElementById("grid");
  g.innerHTML="";
  grid=[]; revealed=[]; selected=[];

  for(let i=0;i<25;i++){
    grid.push(items[Math.floor(Math.random()*items.length)]);
    revealed.push(false);

    let cell=document.createElement("div");
    cell.className="cell";
    cell.innerText="вђЬ";
    cell.onclick=()=>clickCell(i);

    g.appendChild(cell);
  }
}

function clickCell(i){
  const cells=document.querySelectorAll(".cell");
  if(revealed[i]) return;

  revealed[i]=true;
  cells[i].innerText=grid[i];
  selected.push(i);

  if(selected.length===3){
    check();
  }
}

function check(){
  const [a,b,c]=selected;

  if(grid[a]===grid[b]&&grid[a]===grid[c]){
    count++;
    document.getElementById("count").innerText=count;
  } else {
    loseLife();
  }

  setTimeout(reset,500);

  if(count>=12){
    alert("Level Complete!");
    location.reload();
  }
}

function reset(){
  const cells=document.querySelectorAll(".cell");
  selected.forEach(i=>{
    revealed[i]=false;
    cells[i].innerText="вђЬ";
  });
  selected=[];
}

function loseLife(){
  lives--;
  document.getElementById("lives").innerText="вЭ§пЄП".repeat(lives);

  if(lives<=0){
    alert("Game Over");
    location.reload();
  }
}
</script>

</body>
</html>
