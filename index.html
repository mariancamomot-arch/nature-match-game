<!DOCTYPE html>
<html>
<head>
<title>Nature Memory Match</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to bottom, #a8e6cf, #dcedc1);
  margin: 0;
}

/* START SCREEN */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #a8e6cf;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

#startScreen h1 {
  font-size: 28px;
}

#startScreen button {
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: #4caf50;
  color: white;
}

/* GAME */
#game {
  display: none;
}

.panel {
  background: white;
  padding: 10px;
  border-radius: 15px;
  margin: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  padding: 10px;
}

.cell {
  aspect-ratio: 1;
  font-size: 28px;
  background: white;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
  <h1>🌿 Nature Memory Match</h1>
  <button onclick="startGame()">▶ Start Game</button>
</div>

<!-- GAME -->
<div id="game">

<h2>🌿 Nature Memory Match</h2>

<button onclick="startSound()">🔊 Start Sound</button>
<button onclick="toggleMute()">🔇 Mute</button>

<div class="panel">
  <p>Level: <span id="level">1</span></p>
  <p>Matches: <span id="count">0</span> / 12</p>
  <p id="lives">Lives: ❤️❤️❤️❤️❤️</p>
  <p>Time: <span id="timer">3</span></p>
</div>

<div class="grid" id="grid"></div>

</div>

<!-- AUDIO -->
<audio id="bgMusic" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5b3d6c1e6d.mp3" loop></audio>
<audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="matchSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script>
const items = ["🌊","🌳","🌸","🍀","🌼","🌵"];
let grid=[],revealed=[],selected=[];
let level=1,count=0,lives=5;
let timer=3,interval;

let music,clickS,matchS,wrongS;
let isMuted = false;

/* START GAME */
function startGame() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("game").style.display = "block";
  createGrid();
}

/* SOUND */
function startSound() {
  music=document.getElementById("bgMusic");
  clickS=document.getElementById("clickSound");
  matchS=document.getElementById("matchSound");
  wrongS=document.getElementById("wrongSound");

  music.volume=0.3;
  music.play();
}

/* MUTE */
function toggleMute() {
  isMuted = !isMuted;

  if (music) music.muted = isMuted;
  if (clickS) clickS.muted = isMuted;
  if (matchS) matchS.muted = isMuted;
  if (wrongS) wrongS.muted = isMuted;
}

/* GRID */
function createGrid(){
  const g=document.getElementById("grid");
  g.innerHTML="";
  grid=[]; revealed=[]; selected=[];

  for(let i=0;i<25;i++){
    grid.push(items[Math.floor(Math.random()*items.length)]);
    revealed.push(false);

    let cell=document.createElement("div");
    cell.className="cell";
    cell.innerText="⬜";
    cell.onclick=()=>clickCell(i);

    g.appendChild(cell);
  }
}

/* TIMER */
function startTimer(){
  timer=3;
  document.getElementById("timer").innerText=timer;

  interval=setInterval(()=>{
    timer--;
    document.getElementById("timer").innerText=timer;

    if(timer===0){
      clearInterval(interval);
      wrongS.play();
      loseLife();
      reset();
    }
  },1000);
}

/* CLICK */
function clickCell(i){
  if(!clickS) return;

  const cells=document.querySelectorAll(".cell");
  if(revealed[i]) return;

  clickS.play();

  if(selected.length===0) startTimer();

  revealed[i]=true;
  cells[i].innerText=grid[i];
  selected.push(i);

  if(selected.length===3){
    clearInterval(interval);
    check();
  }
}

/* CHECK */
function check(){
  const [a,b,c]=selected;

  if(grid[a]===grid[b] && grid[a]===grid[c]){
    matchS.play();
    count++;
    document.getElementById("count").innerText=count;
  } else {
    wrongS.play();
    loseLife();
  }

  setTimeout(reset,500);

  if(count>=12) nextLevel();
}

/* RESET */
function reset(){
  const cells=document.querySelectorAll(".cell");
  selected.forEach(i=>{
    revealed[i]=false;
    cells[i].innerText="⬜";
  });
  selected=[];
}

/* LIFE */
function loseLife(){
  lives--;
  document.getElementById("lives").innerText="❤️".repeat(lives);

  if(lives<=0){
    alert("💀 Game Over");
    location.reload();
  }
}

/* LEVEL */
function nextLevel(){
  level++;
  count=0;

  document.getElementById("level").innerText=level;
  document.getElementById("count").innerText=count;

  if(level>100){
    alert("🏆 You finished Level 100!");
    location.reload();
    return;
  }

  alert("🌟 Level " + level);
  createGrid();
}
</script>

</body>
</html>
