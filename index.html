<!DOCTYPE html>
<html>
<head>
<title>Nature Memory Match</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4caf50">
<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center center fixed;
  background-size: cover;
}

#app {
  max-width: 420px;
  margin: auto;
  height: 100vh;
  background: rgba(255,255,255,0.95);
  display: flex;
  flex-direction: column;
}

.header {
  background: #4caf50;
  color: white;
  padding: 15px;
  font-size: 18px;
}

.screen {
  flex: 1;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.active {
  display: flex;
}

button {
  padding: 12px 20px;
  margin: 8px;
  border: none;
  border-radius: 10px;
  background: #4caf50;
  color: white;
}

.panel {
  background: #f5f5f5;
  padding: 10px;
  border-radius: 10px;
  margin: 10px;
  font-size: 14px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  padding: 10px;
}

.cell {
  aspect-ratio: 1;
  font-size: 26px;
  background: white;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>

<body>

<div id="app">

<div class="header">🌿 Nature Match</div>

<!-- START -->
<div id="startScreen" class="screen active">
  <h2>Nature Memory Match</h2>
  <button onclick="showGame()">▶ Start Game</button>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">

<button onclick="startSound()">🔊 Sound</button>
<button onclick="toggleMute()">🔇 Mute</button>

<div class="panel">
  Level: <span id="level">1</span> |
  Matches: <span id="count">0</span>/12 |
  Lives: <span id="lives">❤️❤️❤️❤️❤️</span> |
  Time: <span id="timer">3</span>
</div>

<div class="grid" id="grid"></div>

</div>

<!-- WIN -->
<div id="winScreen" class="screen">
  <h2>🏆 You Win!</h2>
  <button onclick="restart()">Play Again</button>
</div>

</div>

<!-- AUDIO -->
<audio id="bgMusic" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5b3d6c1e6d.mp3" loop></audio>
<audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="matchSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script>
const items=["🌊","🌳","🌸","🍀","🌼","🌵"];
let grid=[],revealed=[],selected=[];
let level=1,count=0,lives=5;
let timer=3,interval;

let music,clickS,matchS,wrongS,isMuted=false;

function showGame(){
  startScreen.classList.remove("active");
  gameScreen.classList.add("active");
  createGrid();
}

function restart(){ location.reload(); }

function startSound(){
  music=bgMusic;
  clickS=clickSound;
  matchS=matchSound;
  wrongS=wrongSound;
  music.volume=0.3;
  music.play();
}

function toggleMute(){
  isMuted=!isMuted;
  if(music) music.muted=isMuted;
  if(clickS) clickS.muted=isMuted;
  if(matchS) matchS.muted=isMuted;
  if(wrongS) wrongS.muted=isMuted;
}

function createGrid(){
  const g=document.getElementById("grid");
  g.innerHTML="";
  grid=[]; revealed=[]; selected=[];

  for(let i=0;i<25;i++){
    grid.push(items[Math.floor(Math.random()*items.length)]);
    revealed.push(false);

    let cell=document.createElement("div");
    cell.className="cell";
    cell.innerText="⬜";
    cell.onclick=()=>clickCell(i);

    g.appendChild(cell);
  }
}

function startTimer(){
  timer=3;
  timerEl.innerText=timer;
  interval=setInterval(()=>{
    timer--;
    timerEl.innerText=timer;
    if(timer===0){
      clearInterval(interval);
      wrongS.play();
      loseLife();
      reset();
    }
  },1000);
}

function clickCell(i){
  if(!clickS) return;
  const cells=document.querySelectorAll(".cell");
  if(revealed[i]) return;

  clickS.play();

  if(selected.length===0) startTimer();

  revealed[i]=true;
  cells[i].innerText=grid[i];
  selected.push(i);

  if(selected.length===3){
    clearInterval(interval);
    check();
  }
}

function check(){
  const [a,b,c]=selected;
  if(grid[a]===grid[b]&&grid[a]===grid[c]){
    matchS.play();
    count++;
    countEl.innerText=count;
  } else {
    wrongS.play();
    loseLife();
  }

  setTimeout(reset,500);

  if(count>=12) nextLevel();
}

function reset(){
  const cells=document.querySelectorAll(".cell");
  selected.forEach(i=>{
    revealed[i]=false;
    cells[i].innerText="⬜";
  });
  selected=[];
}

function loseLife(){
  lives--;
  livesEl.innerText="❤️".repeat(lives);
  if(lives<=0){
    alert("Game Over");
    location.reload();
  }
}

function nextLevel(){
  level++;
  count=0;
  levelEl.innerText=level;
  countEl.innerText=count;

  if(level>100){
    gameScreen.classList.remove("active");
    winScreen.classList.add("active");
    return;
  }

  createGrid();
}

const levelEl=document.getElementById("level");
const countEl=document.getElementById("count");
const livesEl=document.getElementById("lives");
const timerEl=document.getElementById("timer");

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
