<!DOCTYPE html>
<html>
<head>
<title>Nature Memory Match</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #a8e6cf;
}

#app {
  max-width: 420px;
  margin: auto;
  height: 100vh;
  background: white;
  display: flex;
  flex-direction: column;
}

.header {
  background: #4caf50;
  color: white;
  padding: 15px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  padding: 10px;
}

.cell {
  aspect-ratio: 1;
  font-size: 26px;
  background: #eee;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  background: #4caf50;
  color: white;
}
</style>
</head>

<body>

<div id="app">

<div class="header">🌿 Easy Nature Match</div>

<p>Lives: <span id="lives">❤️❤️❤️❤️❤️❤️❤️</span></p>
<p>Matches: <span id="count">0</span>/12</p>

<button onclick="resetGame()">🔄 Reset</button>

<div class="grid" id="grid"></div>

</div>

<script>
const items=["🌊","🌳","🌸","🍀","🌼","🌵"];
let grid=[],revealed=[],selected=[];
let lives=7,count=0;

/* SAVE */
function saveGame(){
  localStorage.setItem("grid", JSON.stringify(grid));
  localStorage.setItem("lives", lives);
  localStorage.setItem("count", count);
}

/* LOAD */
function loadGame(){
  const savedGrid = localStorage.getItem("grid");

  if(savedGrid){
    grid = JSON.parse(savedGrid);
    lives = parseInt(localStorage.getItem("lives")) || 7;
    count = parseInt(localStorage.getItem("count")) || 0;

    drawGrid();
    updateUI();
  } else {
    lives = 7;
    count = 0;
    createGrid();
    previewTiles();
  }
}

/* RESET */
function resetGame(){
  localStorage.clear();
  location.reload();
}

/* GRID */
function createGrid(){
  const g=document.getElementById("grid");
  g.innerHTML="";
  grid=[]; revealed=[]; selected=[];

  for(let i=0;i<25;i++){
    grid.push(items[Math.floor(Math.random()*items.length)]);
    revealed.push(false);

    let cell=document.createElement("div");
    cell.className="cell";
    cell.innerText="⬜";
    cell.onclick=()=>clickCell(i);

    g.appendChild(cell);
  }
}

/* DRAW SAVED GRID */
function drawGrid(){
  const g=document.getElementById("grid");
  g.innerHTML="";
  revealed=[]; selected=[];

  for(let i=0;i<grid.length;i++){
    revealed.push(false);

    let cell=document.createElement("div");
    cell.className="cell";
    cell.innerText="⬜";
    cell.onclick=()=>clickCell(i);

    g.appendChild(cell);
  }
}

/* PREVIEW */
function previewTiles(){
  const cells=document.querySelectorAll(".cell");

  cells.forEach((cell,i)=>{
    cell.innerText=grid[i];
  });

  setTimeout(()=>{
    cells.forEach(cell=>cell.innerText="⬜");
  },3000);
}

/* CLICK */
function clickCell(i){
  const cells=document.querySelectorAll(".cell");
  if(revealed[i]) return;

  revealed[i]=true;
  cells[i].innerText=grid[i];
  selected.push(i);

  if(selected.length===3){
    check();
  }
}

/* CHECK */
function check(){
  const [a,b,c]=selected;

  if(grid[a]===grid[b] && grid[a]===grid[c]){
    count++;
  } else {
    loseLife();
  }

  setTimeout(reset,500);

  if(count>=12){
    alert("Level Complete!");
    localStorage.clear();
    location.reload();
  }

  saveGame();
  updateUI();
}

/* RESET TILES */
function reset(){
  const cells=document.querySelectorAll(".cell");
  selected.forEach(i=>{
    revealed[i]=false;
    cells[i].innerText="⬜";
  });
  selected=[];
}

/* LIFE */
function loseLife(){
  lives--;
  if(lives<=0){
    alert("Game Over");
    localStorage.clear();
    location.reload();
  }
}

/* UI */
function updateUI(){
  document.getElementById("lives").innerText="❤️".repeat(lives);
  document.getElementById("count").innerText=count;
}

/* START */
window.onload = function(){
  loadGame();
};
</script>

</body>
</html>
